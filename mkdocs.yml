site_name: HELLOI's Course Note
site_url: https://helloi9.github.io/NJU_Notes/
site_description: Studying at The School of Intelligent Software and Engineering of Nanjing University
repo_url: https://github.com/helloi9/NJU_Notes
repo_name: helloi9/NJU_Notes
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  custom_dir: docs/overrides
  font:
    text: Fira Sans
    code: Fira Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/book-open-page-variant
  favicon: assets/favicon.ico
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tooltips
  palette:
    - scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/helloi9

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-\.]+'

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Course Notes:
      - Introduction: notes/introduction.md
      - The second semester of sophomore year:
        - Internet Computing: 
          - Introduction: notes/The second semester of sophomore year/Internet Computing/Introduction/introduction.md
          - 1-计算机网络和因特网: notes/The second semester of sophomore year/Internet Computing/1-计算机网络和因特网/1-计算机网络和因特网.md
        - New Technologies in Mobile Networks: notes/The second semester of sophomore year/New Technologies in Mobile Networks/introduction.md
        - Human-Computer Interaction Systems: notes/The second semester of sophomore year/Human-Computer Interaction Systems/introduction.md
        - Foundations of Data Management: notes/The second semester of sophomore year/Foundations of Data Management/introduction.md
        - Computer Operating Systems: notes/The second semester of sophomore year/Computer Operating Systems/introduction.md
        - Software Engineering and Computing II: notes/The second semester of sophomore year/Software Engineering and Computing II/introduction.md
  - Blog:
      - First Post: blog/first-post.md
  - About: about.md
