site_name: HELLOI's Course Note
site_url: https://helloi9.github.io/NJU_Notes/
site_description: Studying at The School of Intelligent Software and Engineering of Nanjing University
repo_url: https://github.com/helloi9/NJU_Notes
repo_name: helloi9/NJU_Notes
edit_uri: edit/main/docs/

theme:
  name: material
  language: zh
  custom_dir: docs/overrides
  font:
    text: Fira Sans
    code: Fira Mono
  icon:
    repo: fontawesome/brands/github
    logo: material/book-open-page-variant
  favicon: assets/favicon.ico
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - content.tooltips
  palette:
    - scheme: default
      primary: white
      accent: teal
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: black
      accent: teal
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/helloi9

plugins:
  - search:
      lang:
        - zh
        - en
      separator: '[\s\-\.]+'

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - meta
  - toc:
      permalink: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
- Home: index.md
- Course Notes:
  - Overview: notes/index.md
  - The second semester of sophomore year:
    - Computer Operating Systems:
      - Overview: notes/The second semester of sophomore year/Computer Operating Systems/index.md
      - Chap Lab: notes/The second semester of sophomore year/Computer Operating Systems/Chap
          Lab/Lab2-协程.md
      - Chap1 绪论:
        - 各种视角下的操作系统: notes/The second semester of sophomore year/Computer Operating
            Systems/Chap1 绪论/各种视角下的操作系统.md
        - 操作系统的发展历程: notes/The second semester of sophomore year/Computer Operating
            Systems/Chap1 绪论/操作系统的发展历程.md
      - Chap2 并发:
        - 1.多处理器编程Multiprocessor Programming: notes/The second semester of sophomore
            year/Computer Operating Systems/Chap2 并发/1.多处理器编程Multiprocessor Programming.md
        - 2.互斥基础: notes/The second semester of sophomore year/Computer Operating Systems/Chap2
            并发/2.互斥基础.md
        - 3.互斥进阶: notes/The second semester of sophomore year/Computer Operating Systems/Chap2
            并发/3.互斥进阶.md
        - 4.同步基础: notes/The second semester of sophomore year/Computer Operating Systems/Chap2
            并发/4.同步基础.md
    - Foundations of Data Management:
      - Overview: notes/The second semester of sophomore year/Foundations of Data
          Management/index.md
      - Chapter1: notes/The second semester of sophomore year/Foundations of Data
          Management/Chapter1/Chapter1.md
      - Chapter2:
        - Chapter2-1-关系数据模型: notes/The second semester of sophomore year/Foundations
            of Data Management/Chapter2/Chapter2-1-关系数据模型.md
        - Chapter2-2-关系代数的基本运算: notes/The second semester of sophomore year/Foundations
            of Data Management/Chapter2/Chapter2-2-关系代数的基本运算.md
        - Chapter2-3-关系代数扩充运算: notes/The second semester of sophomore year/Foundations
            of Data Management/Chapter2/Chapter2-3-关系代数扩充运算.md
      - Chapter3:
        - Chapter3-1-SQL数据库的定义: notes/The second semester of sophomore year/Foundations
            of Data Management/Chapter3/Chapter3-1-SQL数据库的定义.md
        - Chapter3-2-SQL数据查询: notes/The second semester of sophomore year/Foundations
            of Data Management/Chapter3/Chapter3-2-SQL数据查询.md
    - Human-Computer Interaction Systems: notes/The second semester of sophomore year/Human-Computer
        Interaction Systems/index.md
    - Internet Computing:
      - Overview: notes/The second semester of sophomore year/Internet Computing/index.md
      - 1-计算机网络和因特网: notes/The second semester of sophomore year/Internet Computing/1-计算机网络和因特网/1-计算机网络和因特网.md
      - 2-应用层: notes/The second semester of sophomore year/Internet Computing/2-应用层/2-应用层.md
      - 3-运输层:
        - 3-运输层: notes/The second semester of sophomore year/Internet Computing/3-运输层/3-运输层.md
        - 3-运输层2: notes/The second semester of sophomore year/Internet Computing/3-运输层/3-运输层2.md
        - 3-运输层3: notes/The second semester of sophomore year/Internet Computing/3-运输层/3-运输层3.md
    - New Technologies in Mobile Networks: notes/The second semester of sophomore
        year/New Technologies in Mobile Networks/index.md
    - Software Engineering and Computing II: notes/The second semester of sophomore
        year/Software Engineering and Computing II/index.md
- Blog:
  - First Post: blog/first-post.md
